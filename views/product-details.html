<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Details | J & L Fashion Collection</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../styles/styles.css">
</head>

<body>

  <div id="navbar-container"></div>

  <main class="container my-5">
    <div id="loading" class="text-center py-5">
      <div class="spinner-border" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
    </div>

    <div id="product-content" class="row d-none">
      <div class="col-md-6 mb-4">
        <div class="bg-white p-3 rounded shadow-sm text-center">
          <img id="detail-image" src="" alt="Product Image" class="product-detail-img">
        </div>
      </div>
      <div class="col-md-6">
        <nav aria-label="breadcrumb">
          <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="../index.html">Home</a></li>
            <li class="breadcrumb-item"><a href="products.html">Products</a></li>
            <li class="breadcrumb-item active" aria-current="page" id="bc-name">Product</li>
          </ol>
        </nav>

        <h1 id="detail-name" class="fw-bold mb-2"></h1>
        <p class="text-muted mb-2"><span id="detail-brand"></span> | <span id="detail-category"></span></p>

        <div class="d-flex align-items-center mb-3">
          <h3 class="fw-bold me-3 mb-0" id="detail-price"></h3>
          <span class="text-muted text-decoration-line-through" id="detail-oldPrice"></span>
        </div>

        <div id="detail-stock-badge" class="stock-badge"></div>

        <p id="detail-description" class="mb-4"></p>

        <h5 class="fw-bold">Product Details</h5>
        <ul id="detail-list" class="mb-4 text-muted">
        </ul>

        <div class="d-flex align-items-center mb-4">
          <input type="number" id="detail-quantity" class="form-control me-3" style="width: 80px;" value="1" min="1">
          <button id="add-btn" class="btn btn-primary-custom flex-grow-1">Add to Cart</button>
        </div>

        <div class="mt-5 pt-4 border-top">
          <h5 class="fw-bold">Reviews & Feedback</h5>
          <div class="mb-3 d-flex align-items-center">
            <span class="fs-5 text-warning me-2" id="detail-stars">★★★★☆</span>
            <span class="text-muted small" id="detail-rating"></span>
          </div>

          <div id="reviews-list">
            <div class="card mb-3 border-0 bg-light p-3">
              <div class="d-flex justify-content-between">
                <span class="fw-bold">Jane Doe</span>
                <span class="text-muted small">2 days ago</span>
              </div>
              <span class="text-warning small mb-1">★★★★★</span>
              <p class="small mb-0">Absolutely love this! The quality is amazing and fits perfectly.</p>
            </div>
          </div>

          <form id="feedback-form" class="mt-4 p-4 border rounded bg-white shadow-sm">
            <h6 class="fw-bold mb-3">Leave a Review</h6>

            <div class="mb-3">
              <label class="form-label small fw-bold">Your Name</label>
              <input type="text" id="review-name" class="form-control form-control-sm" placeholder="e.g. Alex Smith"
                required>
            </div>

            <div class="mb-3">
              <label class="form-label small fw-bold">Rating</label>
              <div class="star-rating">
                <input type="radio" id="star5" name="rating" value="5" required /><label for="star5"
                  title="5 stars">★</label>
                <input type="radio" id="star4" name="rating" value="4" /><label for="star4" title="4 stars">★</label>
                <input type="radio" id="star3" name="rating" value="3" /><label for="star3" title="3 stars">★</label>
                <input type="radio" id="star2" name="rating" value="2" /><label for="star2" title="2 stars">★</label>
                <input type="radio" id="star1" name="rating" value="1" /><label for="star1" title="1 star">★</label>
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label small fw-bold">Your Feedback</label>
              <textarea id="review-text" class="form-control form-control-sm" rows="3"
                placeholder="What did you think of this product?" required></textarea>
            </div>

            <button type="submit" class="btn btn-primary-custom btn-sm w-100">Submit Review</button>
          </form>
        </div>
      </div>
    </div>
  </main>

  <div id="footer-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../data/products.js"></script>
  <script src="../js/cart.js"></script>
  <script src="../js/app.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      await app.init();

      const urlParams = new URLSearchParams(window.location.search);
      const productId = parseInt(urlParams.get('id'));

      if (productId) {
        const product = app.products.find(p => p.id === productId);
        if (product) {
          document.getElementById("loading").classList.add("d-none");
          document.getElementById("product-content").classList.remove("d-none");

          document.getElementById("bc-name").textContent = product.name;
          document.getElementById("detail-name").textContent = product.name;
          document.getElementById("detail-brand").textContent = product.brand;
          document.getElementById("detail-category").textContent = product.category;

          document.getElementById("detail-price").textContent = `$${product.price.toFixed(2)}`;
          if (product.oldPrice) {
            document.getElementById("detail-oldPrice").textContent = `$${product.oldPrice.toFixed(2)}`;
          }

          document.getElementById("detail-image").src = product.images[0];
          document.getElementById("detail-image").alt = product.name;
          document.getElementById("detail-description").textContent = product.description;

          if (product.stock > 0) {
            document.getElementById("detail-stock-badge").innerHTML = `<span class="text-success">In Stock (${product.stock} left)</span>`;
          } else {
            document.getElementById("detail-stock-badge").innerHTML = `<span class="text-danger">Out of Stock</span>`;
            document.getElementById("add-btn").disabled = true;
            document.getElementById("detail-quantity").disabled = true;
          }

          const ul = document.getElementById("detail-list");
          product.details.forEach(detail => {
            const li = document.createElement("li");
            li.textContent = detail;
            ul.appendChild(li);
          });

          document.getElementById("detail-rating").textContent = `${product.rating} / 5 (Based on ${product.reviewCount} reviews)`;

          document.getElementById("add-btn").addEventListener("click", () => {
            const qty = parseInt(document.getElementById("detail-quantity").value) || 1;
            cart.addItem(product, qty);
          });

          const feedbackForm = document.getElementById("feedback-form");
          feedbackForm.addEventListener("submit", (e) => {
            e.preventDefault();

            const name = document.getElementById("review-name").value;
            const text = document.getElementById("review-text").value;
            const rating = feedbackForm.querySelector('input[name="rating"]:checked').value;
            const stars = "★".repeat(rating) + "☆".repeat(5 - rating);

            const reviewHtml = `
              <div class="card mb-3 border-0 bg-light p-3">
                <div class="d-flex justify-content-between">
                  <span class="fw-bold">${name}</span>
                  <span class="text-muted small">Just now</span>
                </div>
                <span class="text-warning small mb-1">${stars}</span>
                <p class="small mb-0">${text}</p>
              </div>
            `;

            const reviewsList = document.getElementById("reviews-list");
            reviewsList.insertAdjacentHTML('afterbegin', reviewHtml);

            app.showToast("Your review has been submitted!", '<i class="fa-solid fa-pen-nib"></i>');
            feedbackForm.reset();

            product.reviewCount++;
            document.getElementById("detail-rating").textContent = `${product.rating} / 5 (Based on ${product.reviewCount} reviews)`;
          });
        } else {
          document.getElementById("loading").innerHTML = "<h3>Product not found</h3>";
        }
      } else {
        document.getElementById("loading").innerHTML = "<h3>No Product ID specified</h3>";
      }
    });
  </script>
</body>

</html>
