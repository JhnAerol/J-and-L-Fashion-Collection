<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products | J & L Fashion Collection</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../styles/styles.css">
</head>
<body>

  <div id="navbar-container"></div>

  <main class="container my-5">
    <div class="row mb-4 align-items-center">
      <div class="col-md-6">
        <h2 class="mb-0">All Products</h2>
      </div>
      <div class="col-md-6 text-md-end mt-3 mt-md-0">
        <form id="search-form" class="d-flex w-100 justify-content-md-end">
          <input type="text" id="search-input" class="form-control w-100" style="max-width:300px;" placeholder="Search products...">
        </form>
      </div>
    </div>

    <div class="d-md-none mb-3">
      <div class="category-scroll-container px-2">
        <div class="category-pill active" onclick="filterByCategory('all', this)">All</div>
        <div class="category-pill" onclick="filterByCategory('Apparel', this)">Apparel</div>
        <div class="category-pill" onclick="filterByCategory('Outerwear', this)">Outerwear</div>
        <div class="category-pill" onclick="filterByCategory('Couture', this)">Couture</div>
        <div class="category-pill" onclick="filterByCategory('Accessories', this)">Accessories</div>
        <div class="category-pill" onclick="filterByCategory('Handbags', this)">Handbags</div>
        <div class="category-pill" onclick="filterByCategory('Jewelry', this)">Jewelry</div>
      </div>
    </div>

    <div class="row mb-4 bg-white p-3 rounded shadow-sm align-items-center d-none d-md-flex">
      <div class="col-md-4 mb-2 mb-md-0">
        <label class="form-label mb-1 fw-bold small">Category</label>
        <select id="category-filter" class="form-select">
          <option value="all">All Categories</option>
          <option value="Apparel">Apparel</option>
          <option value="Outerwear">Outerwear</option>
          <option value="Couture">Couture</option>
          <option value="Accessories">Accessories</option>
          <option value="Handbags">Handbags</option>
          <option value="Jewelry">Jewelry</option>
        </select>
      </div>
      <div class="col-md-4 mb-2 mb-md-0">
        <label class="form-label mb-1 fw-bold small">Brand</label>
        <select id="brand-filter" class="form-select">
          <option value="all">All Brands</option>
          <option value="Valémoire Atelier">Valémoire Atelier</option>
          <option value="Aurevian Couture">Aurevian Couture</option>
          <option value="Élarion Collection">Élarion Collection</option>
        </select>
      </div>
      <div class="col-md-4">
        <label class="form-label mb-1 fw-bold small">Sort By</label>
        <select id="price-filter" class="form-select">
          <option value="default">Default</option>
          <option value="low-high">Price: Low to High</option>
          <option value="high-low">Price: High to Low</option>
        </select>
      </div>
    </div>

    <div class="d-md-none mb-4 d-flex gap-2 px-2 overflow-x-auto" style="scrollbar-width: none;">
      <button class="btn btn-sm btn-outline-dark rounded-pill px-3" data-bs-toggle="modal" data-bs-target="#filterModal">Filters <i class="fa-solid fa-gear"></i></button>
      <button class="btn btn-sm btn-outline-dark rounded-pill px-3">Price: Low to High</button>
    </div>

    <div class="row g-1 g-md-4" id="products-grid">
      <div class="col-12 text-center py-5">
        <div class="spinner-border" role="status">
          <span class="visually-hidden">Loading...</span>
        </div>
      </div>
    </div>
  </main>

  <div id="footer-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../data/products.js"></script>
  <script src="../js/cart.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/search.js"></script>
  <script src="../js/filters.js"></script>
  <script>
    window.renderProducts = function(productsToRender) {
      const g = document.getElementById('products-grid');
      if (productsToRender.length === 0) {
        g.innerHTML = `<div class="col-12 text-center py-5"><p class="text-muted">No products found matching your criteria.</p></div>`;
        return;
      }
      let html = '';
      productsToRender.forEach(p => {
        html += app.getProductCardHTML(p);
      });
      g.innerHTML = html;
    };

    window.filterByCategory = function(category, element) {
      document.querySelectorAll('.category-pill').forEach(p => p.classList.remove('active'));
      element.classList.add('active');

      if (category === 'all') {
        window.renderProducts(app.products);
      } else {
        const filtered = app.products.filter(p => p.category === category);
        window.renderProducts(filtered);
      }
    };

    document.addEventListener("DOMContentLoaded", async () => {
      await app.init();
      window.renderProducts(app.products);
    });
  </script>
</body>
</html>
