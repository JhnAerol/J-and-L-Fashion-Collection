<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>J & L Fashion Collection</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../styles/styles.css">
</head>

<body>

  <div id="navbar-container"></div>

  <main>
    <section class="hero-section">
      <div class="hero-overlay"></div>
      <div class="hero-content">
        <h1>J & L Fashion Collection</h1>
        <p>Stylish and modern clothing, apparel, and accessories for everyday wear.</p>
        <a href="products.html" class="btn btn-primary-custom btn-lg">Shop Now</a>
      </div>
    </section>

    <section class="bg-gray py-5 border-top border-bottom">
      <div class="container text-center">
        <h6 class="text-uppercase text-muted fw-bold mb-4 small" style="letter-spacing: 2px;">Our Premium Partners</h6>
        <div class="row row-cols-2 row-cols-md-3 g-4 align-items-center opacity-75">
          <div class="col">
            <h4 class="fw-bold mb-0" style="font-family: serif;">Valémoire</h4>
          </div>
          <div class="col">
            <h4 class="fw-bold mb-0" style="font-family: 'Times New Roman';">AUREVIAN</h4>
          </div>
          <div class="col">
            <h4 class="fw-bold mb-0" style="font-family: Arial;">ÉLARION</h4>
          </div>
        </div>
      </div>
    </section>

    <section class="container my-5">
      <h2 class="text-center mb-5 fw-bold">Featured Collection</h2>
      <div class="row g-4" id="featured-products-container">
        <div class="col-12 text-center py-5" id="loading-spinner">
          <div class="spinner-border" role="status">
            <span class="visually-hidden">Loading...</span>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div id="footer-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../data/products.js"></script>
  <script src="../js/cart.js"></script>
  <script src="../js/app.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      await app.init();
      app.loadFeaturedProducts();
    });
  </script>
</body>

</html>
