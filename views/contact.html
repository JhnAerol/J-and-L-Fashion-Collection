<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us | J & L Fashion Collection</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../styles/styles.css">
</head>

<body>

  <div id="navbar-container"></div>

  <main class="container my-5 flex-grow-1">
    <div class="text-center mb-5">
      <h1 class="fw-bold">Get In Touch</h1>
      <p class="text-muted">We'd love to hear from you. Please fill out the form below or reach us via our contact
        details.</p>
    </div>

    <div class="row">
      <div class="col-md-5 mb-4 mb-md-0">
        <div class="bg-white p-4 h-100 rounded shadow-sm">
          <h4 class="fw-bold mb-4">Contact Details</h4>

          <div class="mb-4">
            <h6 class="text-muted fw-bold text-uppercase small mb-1">Email</h6>
            <a href="mailto:support@jlfashion.com" class="text-dark text-decoration-none fs-5">support@jlfashion.com</a>
          </div>

          <div class="mb-4">
            <h6 class="text-muted fw-bold text-uppercase small mb-1">Phone</h6>
            <a href="tel:+1234567890" class="text-dark text-decoration-none fs-5">+1 (234) 567-8900</a>
          </div>

          <div class="mb-4">
            <h6 class="text-muted fw-bold text-uppercase small mb-1">Social Media</h6>
            <div class="d-flex gap-3 mt-2">
              <a href="https://www.facebook.com/share/1CJ8hUHTRj/" target="_blank" rel="noopener noreferrer" class="social-icon-link" title="Facebook"><i class="fab fa-facebook-f"></i></a>
              <a href="https://www.instagram.com/jlfashioncollection?igsh=YmtxMTUzZGsxb3B3" target="_blank" rel="noopener noreferrer" class="social-icon-link" title="Instagram"><i class="fab fa-instagram"></i></a>
            </div>
          </div>
        </div>
      </div>

      <div class="col-md-7">
        <div class="bg-white p-4 h-100 rounded shadow-sm">
          <form id="contact-form">
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label fw-bold small">First Name</label>
                <input type="text" class="form-control" required>
              </div>
              <div class="col-md-6">
                <label class="form-label fw-bold small">Last Name</label>
                <input type="text" class="form-control" required>
              </div>
              <div class="col-12">
                <label class="form-label fw-bold small">Email Address</label>
                <input type="email" class="form-control" required>
              </div>
              <div class="col-12">
                <label class="form-label fw-bold small">Message</label>
                <textarea class="form-control" rows="5" required></textarea>
              </div>
              <div class="col-12 mt-4">
                <button type="submit" class="btn btn-primary-custom w-100">Send Message</button>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </main>

  <div id="footer-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../data/products.js"></script>
  <script src="../js/cart.js"></script>
  <script src="../js/app.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      await app.init();

      const contactForm = document.getElementById('contact-form');
      if (contactForm) {
        contactForm.addEventListener('submit', (e) => {
          e.preventDefault();
          app.showToast("Your message has been sent successfully!", '<i class="fa-solid fa-envelope"></i>');
          contactForm.reset();
        });
      }
    });
  </script>
</body>

</html>
